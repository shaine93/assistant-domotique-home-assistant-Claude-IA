name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Syntax check
        run: |
          python -m py_compile config.py
          python -m py_compile shared.py
          python -m py_compile skills.py
          python -m py_compile assistant.py
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            config.py
            shared.py
            skills.py
            assistant.py
            deploy_server.py
            APPAREILS_CONNUS.json
            requirements.txt
            config.example.json
            comportement.example.txt
