name: AssistantIA Domotique
version: "1.5.5"
slug: assistantia
description: "L'antivirus de votre maison — Agent IA autonome qui surveille, apprend et optimise votre énergie via Home Assistant + Claude AI"
url: https://github.com/shaine93/assistant-domotique-home-assistant-Claude-IA
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
homeassistant_api: true
hassio_api: true
ingress: false
panel_icon: mdi:robot
panel_title: AssistantIA
options:
  telegram_token: ""
  anthropic_api_key: ""
  sms_method: "ha_notify"
  anthropic_monthly_budget_usd: 10
  enable_deploy_server: false
schema:
  telegram_token: str
  anthropic_api_key: str
  sms_method: list(free_mobile|ha_notify|email)
  anthropic_monthly_budget_usd: int
  enable_deploy_server: bool
map:
  - config:rw
  - ssl:ro
startup: application
boot: auto
