name: "AssistantIA Domotique"
description: "Agent IA autonome qui surveille votre maison — Claude AI × Home Assistant × Telegram"
version: "7.60"
slug: "assistantia-domotique"
url: "https://github.com/shaine93/assistantia-domotique"
arch:
  - aarch64
  - amd64
  - armv7
startup: "application"
boot: "auto"
options:
  telegram_token: ""
  telegram_chat_id: ""
  ha_token: ""
  anthropic_api_key: ""
  sms_method: "free_mobile"
  free_mobile_user: ""
  free_mobile_pass: ""
  anthropic_monthly_budget_usd: 10
schema:
  telegram_token: str
  telegram_chat_id: str
  ha_token: str
  anthropic_api_key: str
  sms_method: "list(free_mobile|ha_notify|email)"
  free_mobile_user: "str?"
  free_mobile_pass: "str?"
  anthropic_monthly_budget_usd: "int(1,100)"
ports:
  8501/tcp: 8501
ports_description:
  8501/tcp: "Deploy Server API"
map:
  - config:rw
  - ssl:ro
